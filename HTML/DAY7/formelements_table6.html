

<html>

<head>

</head>
<body>

    <section>
        <div>

            <br><br>
            <label>E-MAIL</label>
            <input type="email">
            <br><br>

            <input type="text">

            <br><br>

            <label>PERCENTAGE</label>

            <label>EXPERIENCE</label>

            <input type="file" value="SUBMITT">
        </div>

    </section>
    </center>
