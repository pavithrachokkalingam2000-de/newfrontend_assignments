<html>

    <head>
        <title>FORM ELEMENTS</title>
    </head>
    <body>
        <center>
        <section>

             <div>

                <h1>STUDENT REGISTRATION FORM</h1>
                <label>NAME</label>
                <input type="text" placeholder="ENTER THE NAME">
                 <br><br>
                 <label>FATHER NAME</label>
                 <input type="text" placeholder="ENTER FATHER NAME">
                 <br><br>
                 <label>MOTHER NAME</label>
                 <input type="text" placeholder="ENTER MOTHER NAME ">
                 <br><br>
                 <label>GENDER</label>
                 <input type="radio" name="gender">Male
                  <input type="radio" name="gender">FEMALE
                  <br><br>
                  <label>DATE OF BIRTH</label>
                  <input type="date">
                  <br><br>
                  <label>E-MAIL</label>
                  <input type="e-mail">
                  <br><br>
                  <label>MOBILE NO</label>
                  <input type="number" placeholder="Enter 10 digit">
                  <br><br>
                  <label>COURSE DETAILS</label>
                  <input type="checkbox" name="course">BA
                  <input type="checkbox" name="course">BSC
                  <input type="checkbox" name="course">BCA
                  <br><br>
                  <label>ADDRESS</label>
                  <textarea rows="3" cols="20"></textarea>
                  <br><br>
                  <input type="submit" value="REGISTER">

                  




             </div>



        </section>

        </center>
        

        
    </body>
</html>
