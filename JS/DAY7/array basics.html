          console.log('Task 6 – Movie Collection Report (Array of Objects)')

          let movie=[

                movie:"GOAT",
                collection:800
            },
            {
                movie:"LEO",
                collection:600
            },
            {
                movie:"Master",
                collection:500
            }
          ]
          let totalcollection=0;
            let highestcollection=0;
            let highestmovie="";


          for (let i=0;i<movie.length;i++){

            if(movie[i].collection>highestcollection){
