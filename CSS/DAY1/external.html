<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXTERNAL CSS</title>
    <link rel="stylesheet" href="../assets/CSS/style.css">

</head>
<body>
    <div>
        <h1>
            This is External CSS
        </h1>
    </div>
    <div>
        <h2>One CSS file can style many HTML pages</h2>
    </div>
    <div>
        <h3>Reusable styles</h3>
    </div>
    <div>
        <p>faster websites loading because CSS can be cached.</p>
    </div>
    <div>
        <p>External CSS means writing CSS code in a separate. css file and linking it to the HTML file.</p>
    </div>
</body>
</html>
